# File: pubspec.yaml

name: student_grade_tracker
description: "A clean, modern Student Grade Tracker built with Flutter, Provider, and Material 3."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management — used exclusively throughout the app (no setState()).
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true